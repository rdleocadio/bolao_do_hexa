# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
#
# Configure Using Gemfile
# gem "pg"

default: &default
  adapter: postgresql
  encoding: unicode

  # Connection pool
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: bolao_do_hexa_development

test:
  <<: *default
  database: bolao_do_hexa_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>

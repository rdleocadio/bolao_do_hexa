  terms:
    title: "Termos de Uso"
    introduction: "Ao utilizar o Bolão do Hexa, você concorda com os termos abaixo."
    sections:
      usage:
        title: "1. Uso da plataforma"
        description: "O Bolão do Hexa é uma plataforma de entretenimento para realização de palpites esportivos."
      account:
        title: "2. Conta do usuário"
        description: "O usuário é responsável pelas informações fornecidas e pela segurança da sua conta."
      rules:
        title: "3. Regras do jogo"
        item_1: "Os palpites devem ser feitos antes do início das partidas"
        item_2: "Após o início, não será possível editar"
        item_3: "A pontuação segue as regras definidas na plataforma"
      availability:
        title: "4. Disponibilidade"
        description: "Não garantimos funcionamento contínuo ou sem interrupções da plataforma."
      conduct:
        title: "5. Conduta"
        item_1: "Não utilizar a plataforma para fins indevidos"
        item_2: "Não tentar manipular resultados ou explorar falhas do sistema"
      changes:
        title: "6. Alterações"
        description: "Os termos podem ser atualizados a qualquer momento."
      acceptance:
        title: "7. Aceite"
        description: "Ao criar uma conta, você declara que leu e concorda com estes termos."

  privacy:
    title: "Política de Privacidade"
    introduction: "Esta plataforma segue as diretrizes da Lei Geral de Proteção de Dados (LGPD - Lei nº 13.709/2018), respeitando a privacidade e a proteção dos dados pessoais dos usuários."
    sections:
      data:
        title: "1. Dados coletados"
        item_1: "Nome"
        item_2: "E-mail"
        item_3: "Foto de perfil (avatar)"
      purpose:
        title: "2. Finalidade do uso"
        description: "Os dados são utilizados para identificação do usuário, exibição em ligas e rankings, e funcionamento do sistema de palpites."
      sharing:
        title: "3. Compartilhamento"
        description: "Seu nome e foto podem ser visíveis para outros usuários dentro da plataforma. Seus dados não são vendidos. O compartilhamento ocorre apenas quando necessário para funcionamento da plataforma ou cumprimento de obrigações legais."
      storage:
        title: "4. Armazenamento"
        description: "Os dados são armazenados em ambiente seguro e protegidos por medidas técnicas compatíveis com aplicações web modernas."
      rights:
        title: "5. Direitos do usuário"
        item_1: "Solicitar alteração dos dados"
        item_2: "Solicitar exclusão da conta"
      cookies:
        title: "6. Cookies"
        description: "Utilizamos apenas cookies essenciais para funcionamento da aplicação (login e sessão)."
      contact:
        title: "7. Contato"
        description: "Para dúvidas, entre em contato com o administrador da plataforma."

